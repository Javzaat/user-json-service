# =====================================================
# User JSON Service application.properties
# -----------------------------------------------------
# Энэ файл нь User JSON Service-ийн үндсэн тохиргоог хадгална.
#
# User JSON Service-ийн үүрэг:
# - User profile CRUD хийх
# - Authorization token-ийг SOAP service-ээр validate хийлгэх
# - PostgreSQL database дээр user_profile table ашиглах
# =====================================================

# Spring Boot application-ийн нэр.
# Log дээр service-ийн нэрийг ялгаж харахад ашиглагдана.
spring.application.name=user-json-service

# JSON service 8080 port дээр ажиллана.
# API Gateway нь VPC private network-ээр энэ service-ийн 8080 port руу request дамжуулдаг.
server.port=8080


# =====================================================
# SOAP Authentication Service тохиргоо
# -----------------------------------------------------
# JSON service өөрөө authentication хийхгүй.
# Харин ирсэн token-ийг SOAP service-ийн ValidateToken operation руу явуулж шалгуулна.
# =====================================================

# SOAP service-ийн private URL.
# Энэ URL нь DigitalOcean VPC доторх user-soap-service private IP болон /ws endpoint байна.
soap.service.url=http://10.104.0.6:8081/ws


# =====================================================
# PostgreSQL Database тохиргоо
# -----------------------------------------------------
# User profile мэдээлэл user_profile table-д хадгалагдана.
# DB_URL, DB_USERNAME, DB_PASSWORD утгуудыг code дотор hardcode хийхгүй,
# systemd environment variable-аас уншиж байна.
# =====================================================

# DigitalOcean Managed PostgreSQL database-ийн JDBC URL.
spring.datasource.url=${DB_URL}

# Database username.
spring.datasource.username=${DB_USERNAME}

# Database password.
spring.datasource.password=${DB_PASSWORD}

# PostgreSQL JDBC driver.
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate-д PostgreSQL database ашиглаж байгааг тодорхой зааж өгч байна.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Entity class дээр үндэслэн table structure-ийг update хийнэ.
# UserProfile entity дээр үндэслэн user_profile table үүсэж/шинэчлэгдэнэ.
spring.jpa.hibernate.ddl-auto=update

# SQL query-үүдийг log дээр харуулна.
# Development/demo үед ямар query ажиллаж байгааг шалгахад хэрэгтэй.
spring.jpa.show-sql=true